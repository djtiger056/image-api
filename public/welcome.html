<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Jimeng + Kling API</title>
  <style>
    :root { color-scheme: dark; }
    body { margin: 0; font-family: -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; background: #0b1020; color: #e5eefc; }
    .wrap { max-width: 980px; margin: 0 auto; padding: 48px 20px; }
    .card { background: #121a33; border: 1px solid #273255; border-radius: 18px; padding: 28px; box-shadow: 0 12px 48px rgba(0,0,0,.24); }
    h1 { margin: 0 0 12px; font-size: 34px; }
    p { line-height: 1.7; color: #b9c7e8; }
    .links { display: flex; flex-wrap: wrap; gap: 12px; margin: 22px 0 8px; }
    a.btn { display: inline-block; padding: 12px 16px; border-radius: 12px; text-decoration: none; color: #07101f; background: #7dd3fc; font-weight: 700; }
    a.btn.secondary { background: #c4b5fd; }
    .hint { margin-top: 18px; font-size: 14px; color: #90a4d4; }
    code { background: rgba(255,255,255,.08); padding: 2px 6px; border-radius: 6px; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>Jimeng + Kling 兼容 API</h1>
      <p>这是一个把 <code>Jimeng session</code> 和 <code>Kling 登录 cookie</code> 统一收口到同一套页面与 API 的服务。</p>
      <div class="links">
        <a class="btn" href="/console">打开可视化控制台</a>
        <a class="btn secondary" href="/docs/api-guide">查看外部调用说明</a>
      </div>
      <p class="hint">控制台里可以保存凭证、检测服务可用性、选择模型并直接生图。</p>
    </div>
  </div>
</body>
</html>
