<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>账号管理器 - images-api</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f1117; color: #e0e0e0; min-height: 100vh;
    }
    .header {
      background: linear-gradient(135deg, #1a1c2e 0%, #2d1f3d 100%);
      padding: 20px 30px; border-bottom: 1px solid #2a2d3e;
      display: flex; align-items: center; justify-content: space-between;
    }
    .header h1 { font-size: 20px; color: #fff; }
    .header .subtitle { font-size: 13px; color: #888; margin-top: 4px; }
    .header .nav { display: flex; gap: 12px; }
    .header .nav a {
      color: #9c9cff; text-decoration: none; font-size: 13px;
      padding: 6px 12px; border-radius: 6px; background: rgba(156,156,255,0.1);
    }
    .header .nav a:hover { background: rgba(156,156,255,0.2); }
    .container { max-width: 1200px; margin: 0 auto; padding: 20px; }

    /* 统计卡片 */
    .stats-grid {
      display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 12px; margin-bottom: 24px;
    }
    .stat-card {
      background: #1a1c2e; border-radius: 10px; padding: 16px;
      border: 1px solid #2a2d3e;
    }
    .stat-card .label { font-size: 12px; color: #888; text-transform: uppercase; }
    .stat-card .value { font-size: 28px; font-weight: 700; color: #fff; margin-top: 4px; }
    .stat-card .sub { font-size: 12px; color: #666; margin-top: 4px; }

    /* 标签页 */
    .tabs {
      display: flex; gap: 0; border-bottom: 1px solid #2a2d3e; margin-bottom: 20px;
    }
    .tab {
      padding: 10px 20px; cursor: pointer; font-size: 14px;
      color: #888; border-bottom: 2px solid transparent;
      transition: all 0.2s;
    }
    .tab:hover { color: #ccc; }
    .tab.active { color: #9c9cff; border-bottom-color: #9c9cff; }

    .tab-content { display: none; }
    .tab-content.active { display: block; }

    /* 表格 */
    .table-wrap {
      background: #1a1c2e; border-radius: 10px; border: 1px solid #2a2d3e;
      overflow: hidden; margin-bottom: 20px;
    }
    table { width: 100%; border-collapse: collapse; }
    th {
      text-align: left; padding: 12px 16px; font-size: 12px;
      color: #888; background: #14152a; text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    td { padding: 12px 16px; font-size: 13px; border-top: 1px solid #1f2037; }
    tr:hover td { background: rgba(156,156,255,0.03); }

    /* 状态标签 */
    .badge {
      display: inline-block; padding: 2px 8px; border-radius: 10px;
      font-size: 11px; font-weight: 600;
    }
    .badge.active { background: #0f3d0f; color: #4caf50; }
    .badge.expired { background: #3d0f0f; color: #f44336; }
    .badge.cooldown { background: #3d3d0f; color: #ff9800; }
    .badge.inactive { background: #2a2a2a; color: #888; }
    .badge.error { background: #3d0f0f; color: #ff5252; }

    /* 按钮 */
    .btn {
      padding: 8px 16px; border: none; border-radius: 6px;
      cursor: pointer; font-size: 13px; transition: all 0.2s;
    }
    .btn-primary { background: #6366f1; color: #fff; }
    .btn-primary:hover { background: #5558e6; }
    .btn-danger { background: #dc2626; color: #fff; }
    .btn-danger:hover { background: #c02020; }
    .btn-sm { padding: 4px 10px; font-size: 12px; }
    .btn-ghost {
      background: transparent; color: #9c9cff;
      border: 1px solid #3a3d5e;
    }
    .btn-ghost:hover { background: rgba(156,156,255,0.1); }

    .action-bar {
      display: flex; justify-content: space-between;
      align-items: center; margin-bottom: 16px;
    }
    .action-bar .left { display: flex; gap: 8px; align-items: center; }
    .filter-select {
      background: #1a1c2e; color: #e0e0e0; border: 1px solid #2a2d3e;
      padding: 6px 12px; border-radius: 6px; font-size: 13px;
    }

    /* 模态框 */
    .modal-overlay {
      display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.7); z-index: 1000;
      justify-content: center; align-items: center;
    }
    .modal-overlay.show { display: flex; }
    .modal {
      background: #1a1c2e; border-radius: 12px; border: 1px solid #2a2d3e;
      padding: 24px; width: 500px; max-width: 90vw; max-height: 80vh;
      overflow-y: auto;
    }
    .modal h3 { font-size: 16px; margin-bottom: 16px; color: #fff; }
    .form-group { margin-bottom: 14px; }
    .form-group label {
      display: block; font-size: 12px; color: #888;
      margin-bottom: 4px; text-transform: uppercase;
    }
    .form-group input, .form-group select, .form-group textarea {
      width: 100%; padding: 8px 12px; background: #0f1117;
      border: 1px solid #2a2d3e; border-radius: 6px;
      color: #e0e0e0; font-size: 13px;
    }
    .form-group textarea { resize: vertical; min-height: 60px; }
    .form-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 20px; }

    /* Toast */
    .toast {
      position: fixed; top: 20px; right: 20px; padding: 12px 20px;
      border-radius: 8px; font-size: 13px; z-index: 2000;
      animation: slideIn 0.3s ease;
    }
    .toast.success { background: #0f3d0f; color: #4caf50; border: 1px solid #2d5a2d; }
    .toast.error { background: #3d0f0f; color: #f44336; border: 1px solid #5a2d2d; }
    @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

    .empty-state {
      text-align: center; padding: 40px; color: #666;
    }
    .empty-state p { margin-top: 8px; font-size: 13px; }

    .points-display { font-size: 12px; }
    .points-display .total { color: #4caf50; font-weight: 600; }
    .points-display .detail { color: #666; }
  </style>
</head>
<body>
  <div class="header">
    <div>
      <h1>🔧 账号管理器</h1>
      <div class="subtitle">images-api 多平台多账号统一管理</div>
    </div>
    <div class="nav">
      <a href="/console">控制台</a>
      <a href="/docs/api-guide">API 文档</a>
      <a href="/ping">健康检查</a>
    </div>
  </div>

  <div class="container">
    <!-- 统计卡片 -->
    <div class="stats-grid" id="statsGrid">
      <div class="stat-card">
        <div class="label">总账号数</div>
        <div class="value" id="statTotal">-</div>
      </div>
      <div class="stat-card">
        <div class="label">活跃账号</div>
        <div class="value" id="statActive" style="color:#4caf50">-</div>
      </div>
      <div class="stat-card">
        <div class="label">今日调用</div>
        <div class="value" id="statUsage">-</div>
      </div>
      <div class="stat-card">
        <div class="label">总积分</div>
        <div class="value" id="statPoints" style="color:#ff9800">-</div>
      </div>
      <div class="stat-card">
        <div class="label">API Keys</div>
        <div class="value" id="statKeys">-</div>
      </div>
    </div>

    <!-- 标签页 -->
    <div class="tabs">
      <div class="tab active" data-tab="accounts">账号管理</div>
      <div class="tab" data-tab="apikeys">API Keys</div>
      <div class="tab" data-tab="settings">系统设置</div>
    </div>

    <!-- 账号管理 -->
    <div class="tab-content active" id="tab-accounts">
      <div class="action-bar">
        <div class="left">
          <select class="filter-select" id="platformFilter">
            <option value="">全部平台</option>
            <option value="jimeng">即梦</option>
            <option value="doubao">豆包</option>
            <option value="kling">可灵</option>
            <option value="xyq">小云雀</option>
            <option value="qwen">通义千问</option>
          </select>
          <button class="btn btn-ghost btn-sm" onclick="loadAccounts()">🔄 刷新</button>
          <button class="btn btn-ghost btn-sm" onclick="runHealthCheck()">💊 健康检查</button>
          <button class="btn btn-ghost btn-sm" onclick="resetDaily()">📅 重置日计数</button>
        </div>
        <button class="btn btn-primary" onclick="showAddModal()">+ 添加账号</button>
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>名称</th>
              <th>平台</th>
              <th>状态</th>
              <th>优先级</th>
              <th>今日/限额</th>
              <th>积分</th>
              <th>凭证</th>
              <th>最后使用</th>
              <th>操作</th>
            </tr>
          </thead>
          <tbody id="accountsTable"></tbody>
        </table>
      </div>
    </div>

    <!-- API Keys -->
    <div class="tab-content" id="tab-apikeys">
      <div class="action-bar">
        <div class="left"><span style="color:#888;font-size:13px">管理外部 API 调用密钥</span></div>
        <button class="btn btn-primary" onclick="showAddKeyModal()">+ 创建 API Key</button>
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>名称</th>
              <th>Key</th>
              <th>速率限制</th>
              <th>允许平台</th>
              <th>调用次数</th>
              <th>状态</th>
              <th>操作</th>
            </tr>
          </thead>
          <tbody id="keysTable"></tbody>
        </table>
      </div>
    </div>

    <!-- 系统设置 -->
    <div class="tab-content" id="tab-settings">
      <div class="table-wrap" style="padding:20px">
        <div class="form-group">
          <label>轮询策略</label>
          <select id="setRotation">
            <option value="weighted-random">加权随机 (推荐)</option>
            <option value="random">纯随机</option>
            <option value="round-robin">轮询</option>
            <option value="least-used">最少使用</option>
            <option value="priority">优先级</option>
          </select>
        </div>
        <div class="form-group">
          <label>故障切换策略</label>
          <select id="setFailover">
            <option value="priority">按优先级</option>
            <option value="round-robin">轮询</option>
            <option value="random">随机</option>
          </select>
        </div>
        <div class="form-group">
          <label>健康检查间隔 (ms)</label>
          <input type="number" id="setHealthInterval" value="300000">
        </div>
        <div class="form-group">
          <label>最大重试次数</label>
          <input type="number" id="setMaxRetry" value="2">
        </div>
        <button class="btn btn-primary" onclick="saveSettings()">保存设置</button>
      </div>
    </div>
  </div>

  <!-- 添加账号模态框 -->
  <div class="modal-overlay" id="addModal">
    <div class="modal">
      <h3>添加账号</h3>
      <div class="form-group">
        <label>平台</label>
        <select id="addPlatform">
          <option value="jimeng">即梦 (Jimeng)</option>
          <option value="doubao">豆包 (Doubao)</option>
          <option value="kling">可灵 (Kling)</option>
          <option value="xyq">小云雀 (XYQ)</option>
          <option value="qwen">通义千问 (Qwen)</option>
        </select>
      </div>
      <div class="form-group">
        <label>账号名称</label>
        <input type="text" id="addName" placeholder="例: 即梦主力号">
      </div>
      <div class="form-group">
        <label>Session ID</label>
        <input type="text" id="addSessionId" placeholder="从浏览器 Cookie 获取">
      </div>
      <div class="form-group">
        <label>Authorization (可选, 优先级高于 SessionID)</label>
        <input type="text" id="addAuthorization" placeholder="Bearer xxx">
      </div>
      <div class="form-group" id="addKeyGroup" style="display:none">
        <label>Access Key</label>
        <input type="text" id="addAccessKey" placeholder="Kling API Access Key">
      </div>
      <div class="form-group" id="addSecretGroup" style="display:none">
        <label>Secret Key</label>
        <input type="text" id="addSecretKey" placeholder="Kling API Secret Key">
      </div>
      <div class="form-group">
        <label>优先级 (1-10, 越大越优先)</label>
        <input type="number" id="addPriority" value="5" min="1" max="10">
      </div>
      <div class="form-group">
        <label>每日限额</label>
        <input type="number" id="addMaxDaily" value="100">
      </div>
      <div class="form-group">
        <label>备注</label>
        <textarea id="addNotes" placeholder="可选备注信息"></textarea>
      </div>
      <div class="form-actions">
        <button class="btn btn-ghost" onclick="closeModal('addModal')">取消</button>
        <button class="btn btn-primary" onclick="addAccount()">添加</button>
      </div>
    </div>
  </div>

  <!-- 添加 API Key 模态框 -->
  <div class="modal-overlay" id="addKeyModal">
    <div class="modal">
      <h3>创建 API Key</h3>
      <div class="form-group">
        <label>名称</label>
        <input type="text" id="keyName" placeholder="例: 外部服务A">
      </div>
      <div class="form-group">
        <label>速率限制</label>
        <input type="text" id="keyRateLimit" value="100/hour" placeholder="100/hour">
      </div>
      <div class="form-group">
        <label>允许平台 (逗号分隔, * 表示全部)</label>
        <input type="text" id="keyPlatforms" value="*" placeholder="jimeng,doubao">
      </div>
      <div class="form-actions">
        <button class="btn btn-ghost" onclick="closeModal('addKeyModal')">取消</button>
        <button class="btn btn-primary" onclick="addApiKey()">创建</button>
      </div>
    </div>
  </div>

  <script>
    const API_BASE = '';

    // ── 通用请求 ──
    async function api(method, path, body) {
      const opts = { method, headers: { 'Content-Type': 'application/json' } };
      if (body) opts.body = JSON.stringify(body);
      const res = await fetch(API_BASE + path, opts);
      const json = await res.json();
      if (json.code !== 0 && !json.ok && json.error) throw new Error(json.error || json.message || '请求失败');
      return json.data || json;
    }

    function toast(msg, type = 'success') {
      const el = document.createElement('div');
      el.className = `toast ${type}`;
      el.textContent = msg;
      document.body.appendChild(el);
      setTimeout(() => el.remove(), 3000);
    }

    // ── 标签页切换 ──
    document.querySelectorAll('.tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        tab.classList.add('active');
        document.getElementById('tab-' + tab.dataset.tab).classList.add('active');
      });
    });

    // ── 统计 ──
    async function loadStats() {
      try {
        const s = await api('GET', '/admin/stats');
        document.getElementById('statTotal').textContent = s.total || 0;
        document.getElementById('statActive').textContent = (s.byStatus && s.byStatus.active) || 0;
        document.getElementById('statUsage').textContent = s.totalUsage || 0;
        document.getElementById('statPoints').textContent = s.totalPoints || 0;
        document.getElementById('statKeys').textContent = s.apiKeys || 0;
      } catch (e) { console.error('加载统计失败', e); }
    }

    // ── 账号列表 ──
    async function loadAccounts() {
      try {
        const platform = document.getElementById('platformFilter').value;
        const url = platform ? `/admin/accounts?platform=${platform}` : '/admin/accounts';
        const data = await api('GET', url);
        const accounts = data.accounts || [];
        const tbody = document.getElementById('accountsTable');

        if (accounts.length === 0) {
          tbody.innerHTML = '<tr><td colspan="9"><div class="empty-state"><p>暂无账号，请点击右上角"添加账号"</p></div></td></tr>';
          return;
        }

        const platformNames = { jimeng:'即梦', doubao:'豆包', kling:'可灵', xyq:'小云雀', qwen:'通义千问' };
        tbody.innerHTML = accounts.map(a => `
          <tr>
            <td><strong>${esc(a.name)}</strong><br><span style="font-size:11px;color:#666">${a.id}</span></td>
            <td>${platformNames[a.platform] || a.platform}</td>
            <td><span class="badge ${a.status}">${a.status}</span></td>
            <td>${a.priority}</td>
            <td>${a.daily_usage} / ${a.max_daily_usage}</td>
            <td class="points-display">
              <span class="total">${a.points.total}</span>
              ${a.points.vip ? '<span class="badge active" style="margin-left:4px">VIP</span>' : ''}
            </td>
            <td style="font-size:11px;color:#666">${a.has_sessionid ? 'SID ✓' : ''} ${a.has_authorization ? 'Auth ✓' : ''} ${a.has_access_key ? 'AK ✓' : ''}</td>
            <td style="font-size:11px;color:#666">${a.last_used_at ? new Date(a.last_used_at).toLocaleString('zh-CN') : '-'}</td>
            <td>
              <button class="btn btn-ghost btn-sm" onclick="deleteAccount('${a.id}')">删除</button>
            </td>
          </tr>
        `).join('');
      } catch (e) { toast('加载账号失败: ' + e.message, 'error'); }
    }

    function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

    document.getElementById('platformFilter').addEventListener('change', loadAccounts);

    // ── 添加账号 ──
    function showAddModal() {
      document.getElementById('addModal').classList.add('show');
    }
    function closeModal(id) {
      document.getElementById(id).classList.remove('show');
    }

    document.getElementById('addPlatform').addEventListener('change', (e) => {
      const isKling = e.target.value === 'kling';
      document.getElementById('addKeyGroup').style.display = isKling ? 'block' : 'none';
      document.getElementById('addSecretGroup').style.display = isKling ? 'block' : 'none';
    });

    async function addAccount() {
      try {
        const platform = document.getElementById('addPlatform').value;
        const body = {
          platform,
          name: document.getElementById('addName').value || `${platform} 账号`,
          sessionid: document.getElementById('addSessionId').value,
          authorization: document.getElementById('addAuthorization').value,
          priority: parseInt(document.getElementById('addPriority').value) || 5,
          max_daily_usage: parseInt(document.getElementById('addMaxDaily').value) || 100,
          notes: document.getElementById('addNotes').value,
        };
        if (platform === 'kling') {
          body.access_key = document.getElementById('addAccessKey').value;
          body.secret_key = document.getElementById('addSecretKey').value;
        }
        await api('POST', '/admin/accounts', body);
        toast('账号添加成功');
        closeModal('addModal');
        loadAccounts();
        loadStats();
      } catch (e) { toast('添加失败: ' + e.message, 'error'); }
    }

    async function deleteAccount(id) {
      if (!confirm(`确定删除账号 ${id}？`)) return;
      try {
        await api('DELETE', `/admin/accounts/${id}`);
        toast('已删除');
        loadAccounts();
        loadStats();
      } catch (e) { toast('删除失败: ' + e.message, 'error'); }
    }

    async function runHealthCheck() {
      try {
        toast('正在检查...');
        await api('POST', '/admin/accounts/check', {});
        toast('健康检查完成');
        loadAccounts();
      } catch (e) { toast('检查失败: ' + e.message, 'error'); }
    }

    async function resetDaily() {
      try {
        await api('POST', '/admin/accounts/reset-daily', {});
        toast('日计数已重置');
        loadAccounts();
      } catch (e) { toast('重置失败: ' + e.message, 'error'); }
    }

    // ── API Keys ──
    async function loadKeys() {
      try {
        const data = await api('GET', '/admin/api-keys');
        const keys = data.keys || [];
        const tbody = document.getElementById('keysTable');
        if (keys.length === 0) {
          tbody.innerHTML = '<tr><td colspan="7"><div class="empty-state"><p>暂无 API Key</p></div></td></tr>';
          return;
        }
        tbody.innerHTML = keys.map(k => `
          <tr>
            <td>${esc(k.name)}</td>
            <td style="font-family:monospace;font-size:12px">${k.key}</td>
            <td>${k.rate_limit}</td>
            <td>${k.allowed_platforms.join(', ')}</td>
            <td>${k.total_calls}</td>
            <td><span class="badge ${k.enabled ? 'active' : 'inactive'}">${k.enabled ? '启用' : '禁用'}</span></td>
            <td>
              <button class="btn btn-ghost btn-sm" onclick="toggleKey('${k.id}', ${!k.enabled})">${k.enabled ? '禁用' : '启用'}</button>
              <button class="btn btn-danger btn-sm" onclick="deleteKey('${k.id}')">删除</button>
            </td>
          </tr>
        `).join('');
      } catch (e) { toast('加载 Key 失败: ' + e.message, 'error'); }
    }

    function showAddKeyModal() {
      document.getElementById('addKeyModal').classList.add('show');
    }

    async function addApiKey() {
      try {
        const platforms = document.getElementById('keyPlatforms').value.split(',').map(s => s.trim());
        await api('POST', '/admin/api-keys', {
          name: document.getElementById('keyName').value || '未命名',
          rate_limit: document.getElementById('keyRateLimit').value,
          allowed_platforms: platforms,
        });
        toast('API Key 创建成功');
        closeModal('addKeyModal');
        loadKeys();
        loadStats();
      } catch (e) { toast('创建失败: ' + e.message, 'error'); }
    }

    async function toggleKey(id, enabled) {
      try {
        await api('PUT', `/admin/api-keys/${id}/toggle`, { enabled });
        loadKeys();
      } catch (e) { toast('操作失败: ' + e.message, 'error'); }
    }

    async function deleteKey(id) {
      if (!confirm('确定删除此 API Key？')) return;
      try {
        await api('DELETE', `/admin/api-keys/${id}`);
        toast('已删除');
        loadKeys();
        loadStats();
      } catch (e) { toast('删除失败: ' + e.message, 'error'); }
    }

    // ── 设置 ──
    async function loadSettings() {
      try {
        const s = await api('GET', '/admin/settings');
        document.getElementById('setRotation').value = s.rotation_strategy || 'weighted-random';
        document.getElementById('setFailover').value = s.failover_strategy || 'priority';
        document.getElementById('setHealthInterval').value = s.health_check_interval_ms || 300000;
        document.getElementById('setMaxRetry').value = s.max_retry_count || 2;
      } catch (e) { console.error(e); }
    }

    async function saveSettings() {
      try {
        await api('POST', '/admin/settings', {
          rotation_strategy: document.getElementById('setRotation').value,
          failover_strategy: document.getElementById('setFailover').value,
          health_check_interval_ms: parseInt(document.getElementById('setHealthInterval').value),
          max_retry_count: parseInt(document.getElementById('setMaxRetry').value),
        });
        toast('设置已保存');
      } catch (e) { toast('保存失败: ' + e.message, 'error'); }
    }

    // ── 初始化 ──
    loadStats();
    loadAccounts();
    loadKeys();
    loadSettings();
  </script>
</body>
</html>
